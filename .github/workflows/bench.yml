name: Benchmarks

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  benchmark:
    name: benchmarks
    runs-on: ubuntu-latest
    permissions:
      contents: write
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libsasl2-dev libcurl4-openssl-dev libssl-dev

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Run benchmarks
        run: |
          cargo bench -p jikan-snapshot -- --message-format json 2>/dev/null | tee bench_output.txt

      - name: Verify benchmark output
        run: |
          if [ ! -s bench_output.txt ]; then
            echo "ERROR: bench_output.txt is empty — cargo bench produced no output"
            exit 1
          fi

      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: cargo
          output-file-path: bench_output.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: "110%"
          comment-on-alert: true
          fail-on-alert: true
